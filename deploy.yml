name: Deploy to Azure App Service

# ─────────────────────────────────────────────────────────────────
# HOW TO ADD A NEW TOPIC — zero manual steps:
#   1. Create  public/topics/security-module.js
#   2. git add + commit + push
#   3. This workflow deploys — server auto-discovers the new file
#   No changes needed to index.html, server.js, or this file.
#
# Branch → deployment target:
#   main        → production   (https://<app>.azurewebsites.net)
#   staging     → staging slot (https://<app>-staging.azurewebsites.net)
#   dev         → dev slot
#   master      → same as main (both treated as production)
#   release/x.y → release-x-y slot (auto-created)
# ─────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, master, staging, dev, 'release/**']
  workflow_dispatch:

env:
  # ── Edit these once ───────────────────────────────────────────
  AZURE_RG:          ntms-cloud-guide-rg
  AZURE_LOCATION:    eastus
  APP_SERVICE_PLAN:  ntms-cloud-guide-plan
  APP_SERVICE_NAME:  ntms-cloud-guide
  NODE_VERSION:      '20-lts'
  APP_SKU:           S1        # S1+ required for deployment slots; B1 = no slots
  # ─────────────────────────────────────────────────────────────

jobs:
  deploy:
    name: Provision (idempotent) + Deploy [${{ github.ref_name }}]
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Azure Login ───────────────────────────────────────
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── 3. Idempotent infrastructure ─────────────────────────
      - name: Provision infrastructure (idempotent)
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME}"
          APP="${{ env.APP_SERVICE_NAME }}"
          RG="${{ env.AZURE_RG }}"
          PLAN="${{ env.APP_SERVICE_PLAN }}"
          LOC="${{ env.AZURE_LOCATION }}"
          SKU="${{ env.APP_SKU }}"

          echo "Branch : $BRANCH | App : $APP | RG : $RG"

          # Resource Group
          if ! az group show --name "$RG" --output none 2>/dev/null; then
            echo "→ Creating resource group..."
            az group create --name "$RG" --location "$LOC" --output none
          else
            echo "✓ Resource group exists"
          fi

          # App Service Plan
          if ! az appservice plan show --name "$PLAN" --resource-group "$RG" --output none 2>/dev/null; then
            echo "→ Creating App Service Plan ($SKU, Linux)..."
            az appservice plan create \
              --name "$PLAN" \
              --resource-group "$RG" \
              --location "$LOC" \
              --sku "$SKU" \
              --is-linux \
              --output none
          else
            echo "✓ App Service Plan exists"
          fi

          # App Service
          if ! az webapp show --name "$APP" --resource-group "$RG" --output none 2>/dev/null; then
            echo "→ Creating App Service..."
            az webapp create \
              --name "$APP" \
              --resource-group "$RG" \
              --plan "$PLAN" \
              --runtime "NODE:${{ env.NODE_VERSION }}" \
              --output none
          else
            echo "✓ App Service exists"
          fi

          # App settings (idempotent)
          az webapp config appsettings set \
            --name "$APP" --resource-group "$RG" \
            --settings \
              WEBSITE_NODE_DEFAULT_VERSION="~20" \
              SCM_DO_BUILD_DURING_DEPLOYMENT="false" \
              NODE_ENV="production" \
            --output none
          echo "✓ App settings applied"

          # Startup command
          az webapp config set \
            --name "$APP" --resource-group "$RG" \
            --startup-file "node server.js" \
            --output none
          echo "✓ Startup command: node server.js"

          # Deployment slot for non-production branches
          IS_PROD="false"
          if [[ "$BRANCH" == "main" || "$BRANCH" == "master" ]]; then
            IS_PROD="true"
          fi

          if [[ "$IS_PROD" == "false" ]]; then
            SLOT="${BRANCH//\//-}"   # release/v2 → release-v2
            SLOT="${SLOT:0:59}"      # max 59 chars
            if ! az webapp deployment slot show \
              --name "$APP" --resource-group "$RG" --slot "$SLOT" \
              --output none 2>/dev/null; then
              echo "→ Creating deployment slot '$SLOT'..."
              az webapp deployment slot create \
                --name "$APP" --resource-group "$RG" \
                --slot "$SLOT" \
                --configuration-source "$APP" \
                --output none
            else
              echo "✓ Slot '$SLOT' exists"
            fi
            echo "DEPLOY_SLOT=$SLOT" >> "$GITHUB_ENV"
            echo "IS_PROD=false"     >> "$GITHUB_ENV"
          else
            echo "DEPLOY_SLOT="      >> "$GITHUB_ENV"
            echo "IS_PROD=true"      >> "$GITHUB_ENV"
          fi

          echo "✅ Infrastructure ready"

      # ── 4. Node.js + install ─────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # cache-dependency-path is auto-detected from package-lock.json

      - name: Install dependencies
        run: npm ci --omit=dev

      # ── 5. Show topics (diagnostic) ──────────────────────────
      - name: Topic modules in this branch
        run: |
          echo "── Auto-discovered topic modules ──"
          ls public/topics/*-module.js 2>/dev/null | sort || echo "(none found)"
          echo "Server will load these automatically — no index.html edit needed."

      # ── 6. Build deployment zip ──────────────────────────────
      - name: Create deployment package
        run: |
          zip -r deploy.zip . \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.md" \
            --exclude ".env*" \
            --exclude "*.test.js" \
            --quiet
          echo "Package size: $(du -sh deploy.zip | cut -f1)"

      # ── 7a. Deploy → Production (main / master) ───────────────
      - name: Deploy → Production
        if: env.IS_PROD == 'true'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_SERVICE_NAME }}
          package: deploy.zip

      # ── 7b. Deploy → Slot (all other branches) ────────────────
      - name: Deploy → Slot (${{ env.DEPLOY_SLOT }})
        if: env.IS_PROD == 'false'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_SERVICE_NAME }}
          slot-name: ${{ env.DEPLOY_SLOT }}
          package: deploy.zip

      # ── 8. Print URL ─────────────────────────────────────────
      - name: Deployment URL
        run: |
          APP="${{ env.APP_SERVICE_NAME }}"
          if [[ "$IS_PROD" == "true" ]]; then
            echo "🚀 Production: https://${APP}.azurewebsites.net"
          else
            echo "🚀 Slot: https://${APP}-${DEPLOY_SLOT}.azurewebsites.net"
          fi

      # ── 9. Logout ────────────────────────────────────────────
      - name: Azure Logout
        if: always()
        run: az logout
