name: Deploy to Azure App Service

# ─────────────────────────────────────────────────────────────────
# ANONYMOUS ACCESS MODEL:
#   - Easy Auth is set to AllowAnonymous → everyone reaches the site
#   - Our Node.js app reads X-MS-CLIENT-PRINCIPAL header to detect auth
#   - Anonymous users see public topics freely
#   - Clicking a locked topic shows a "Sign in" prompt
#   - No one is forcefully redirected to Microsoft login on page load
#
# HOW TO ADD A NEW TOPIC — zero steps:
#   1. Create  public/topics/security-module.js
#   2. git push → auto-deployed, server auto-discovers the file
#   No changes to index.html, server.js, or this workflow needed.
# ─────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, master, staging, dev, 'release/**']
  workflow_dispatch:

env:
  AZURE_RG:       ntms-cloud-guide-rg
  AZURE_LOCATION: eastus
  APP_PLAN:       ntms-cloud-guide-plan
  APP_NAME:       ntms-cloud-guide
  NODE_RUNTIME:   NODE:20-lts
  APP_SKU:        B1

jobs:
  deploy:
    name: Provision (idempotent) + Deploy [${{ github.ref_name }}]
    runs-on: ubuntu-latest

    steps:
      # 1 ── Checkout ───────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # 2 ── Azure Login ────────────────────────────────────────
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 3 ── Idempotent infrastructure ──────────────────────────
      - name: Provision infrastructure (idempotent)
        shell: bash
        run: |
          set -euo pipefail
          RG="${{ env.AZURE_RG }}"
          LOC="${{ env.AZURE_LOCATION }}"
          PLAN="${{ env.APP_PLAN }}"
          APP="${{ env.APP_NAME }}"
          SKU="${{ env.APP_SKU }}"

          # ── Resource Group ───────────────────────────────────
          if ! az group show --name "$RG" --output none 2>/dev/null; then
            echo "→ Creating resource group $RG..."
            az group create --name "$RG" --location "$LOC" --output none
          else
            echo "✓ Resource group: $RG"
          fi

          # ── App Service Plan (B1 Linux, no slots) ────────────
          if ! az appservice plan show --name "$PLAN" --resource-group "$RG" --output none 2>/dev/null; then
            echo "→ Creating App Service Plan $PLAN (B1, Linux)..."
            az appservice plan create \
              --name "$PLAN" \
              --resource-group "$RG" \
              --location "$LOC" \
              --sku "$SKU" \
              --is-linux \
              --output none
          else
            echo "✓ App Service Plan: $PLAN"
          fi

          # ── App Service ──────────────────────────────────────
          if ! az webapp show --name "$APP" --resource-group "$RG" --output none 2>/dev/null; then
            echo "→ Creating App Service $APP..."
            az webapp create \
              --name "$APP" \
              --resource-group "$RG" \
              --plan "$PLAN" \
              --runtime "${{ env.NODE_RUNTIME }}" \
              --output none
          else
            echo "✓ App Service: $APP"
          fi

          # ── App Settings ─────────────────────────────────────
          # AUTH_ENABLED=true  → server.js checks X-MS-CLIENT-PRINCIPAL header
          # PROTECTED_TOPICS   → comma-separated topic IDs that need login
          #                       Change anytime in App Service → Configuration
          az webapp config appsettings set \
            --name "$APP" --resource-group "$RG" \
            --settings \
              WEBSITE_NODE_DEFAULT_VERSION="~20" \
              SCM_DO_BUILD_DURING_DEPLOYMENT="false" \
              NODE_ENV="production" \
              AUTH_ENABLED="true" \
              PROTECTED_TOPICS="devops,db,compute" \
            --output none
          echo "✓ App settings applied"

          # ── Startup command ──────────────────────────────────
          az webapp config set \
            --name "$APP" --resource-group "$RG" \
            --startup-file "node server.js" \
            --output none
          echo "✓ Startup: node server.js"

          # ── CRITICAL: Easy Auth = AllowAnonymous ─────────────
          # This lets everyone reach the site WITHOUT being forced
          # to log in. Our app (server.js) reads the auth header
          # and gates individual topics — NOT the whole site.
          #
          # If Easy Auth is not yet configured (no client ID set),
          # this step is skipped gracefully — the site still works,
          # just without the Entra ID sign-in button.
          AUTH_STATUS=$(az webapp auth show \
            --name "$APP" --resource-group "$RG" \
            --query "properties.enabled" --output tsv 2>/dev/null || echo "false")

          if [ "$AUTH_STATUS" = "true" ]; then
            echo "→ Ensuring Easy Auth action = AllowAnonymous..."
            az webapp auth update \
              --name "$APP" --resource-group "$RG" \
              --action AllowAnonymous \
              --output none
            echo "✓ Easy Auth: AllowAnonymous (site open, app gates topics)"
          else
            echo "ℹ Easy Auth not configured yet — site runs fully open."
            echo "  After setting up Entra ID app registration, run:"
            echo "  az webapp auth microsoft update --name $APP --resource-group $RG ..."
          fi

          echo ""
          echo "✅ Infrastructure ready"
          echo "🌐 https://${APP}.azurewebsites.net"

      # 4 ── Node.js + install ──────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --omit=dev --no-audit --no-fund

      # 5 ── Show auto-discovered topics ────────────────────────
      - name: Topic modules in this branch
        run: |
          echo "── Auto-discovered topic modules ──────────────"
          ls public/topics/*-module.js 2>/dev/null | sort || echo "(none)"
          echo "Server loads these automatically on startup."
          echo "───────────────────────────────────────────────"

      # 6 ── Build zip ──────────────────────────────────────────
      - name: Create deployment package
        run: |
          zip -r deploy.zip . \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.md" \
            --exclude ".env*" \
            --quiet
          echo "Package: $(du -sh deploy.zip | cut -f1)"

      # 7 ── Deploy ─────────────────────────────────────────────
      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          package: deploy.zip

      # 8 ── Print URL ───────────────────────────────────────────
      - name: Deployed URL
        run: echo "🚀 https://${{ env.APP_NAME }}.azurewebsites.net"

      # 9 ── Logout ─────────────────────────────────────────────
      - name: Azure Logout
        if: always()
        run: az logout
